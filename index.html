<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
}

.container{
width:400px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
color:#2196F3;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#2196F3;
color:white;
border:none;
cursor:pointer;
}
</style>

</head>
<body>

<div class="container">

<h2>User Login</h2>

<form action="login.php" method="POST">

    <input type="email"
           name="email"
           placeholder="Enter Email"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Enter Password"
           required>

    <br><br>

    <button type="submit">Login</button>

</form>

</div>

</body>
</html>
